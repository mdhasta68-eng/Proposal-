<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Drawing Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    color: #6496ff;
  }

  #mainCanvas {
    display: block;
    cursor: crosshair;
  }



  /* Vignette overlay */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 40%,
      rgba(5, 5, 15, 0.6) 75%,
      rgba(0, 0, 8, 0.9) 100%
    );
    z-index: 50;
  }
</style>
</head>
<body>

<canvas id="mainCanvas"></canvas>
<div id="vignette"></div>



<script>
// ══════════════════════════════════════════════════
//  SPIDER DRAWING TOOL — Core Engine
// ══════════════════════════════════════════════════

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); generatePath(); });

// ── State ──────────────────────────────────────────
let pathPoints = [];
let pathIndex = 0;
let spider = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, targetAngle: 0, speed: 0 };
let webTrail = []; // {x, y, alpha}
let dustParticles = [];
let paused = false;
let animId;
let phase = 'drawing'; // 'drawing' | 'fading' | 'waiting'
let waitTimer = 0;
const WAIT_FRAMES = 60;  // কতক্ষণ অপেক্ষা করবে complete হওয়ার পর
// ═══════════════════════════════════════
//  ✏️  নাম এখানে পরিবর্তন করুন:
const currentText = 'NUHA';
// ═══════════════════════════════════════

// ── Generate Text Path ─────────────────────────────
function measureFontSize(text, maxW, maxH) {
  const off = document.createElement('canvas');
  off.width = maxW * 2; off.height = maxH * 2;
  const c = off.getContext('2d');
  // Start large, shrink until text fits within 88% of screen width
  let size = Math.floor(maxH * 0.55);
  while (size > 30) {
    c.font = `900 ${size}px Orbitron, monospace`;
    const measured = c.measureText(text).width;
    if (measured <= maxW * 0.88) break;
    size -= 4;
  }
  return size;
}

function generatePath() {
  const text = currentText || 'SPIDER';
  const fontSize = measureFontSize(text, W, H);

  // Offscreen canvas to sample pixels
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const offCtx = off.getContext('2d');

  offCtx.fillStyle = '#fff';
  offCtx.font = `900 ${fontSize}px Orbitron, monospace`;
  offCtx.textAlign = 'center';
  offCtx.textBaseline = 'middle';
  offCtx.fillText(text, W / 2, H / 2);

  const imgData = offCtx.getImageData(0, 0, W, H).data;
  const step = Math.max(4, Math.floor(fontSize / 48));
  let points = [];

  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      const idx = (y * W + x) * 4;
      if (imgData[idx + 3] > 128) {
        points.push({ x, y });
      }
    }
  }

  // Ordered path via nearest-neighbor greedy
  pathPoints = orderPoints(points);
  pathIndex = 0;

  if (pathPoints.length > 0) {
    spider.x = pathPoints[0].x;
    spider.y = pathPoints[0].y;
    spider.vx = 0; spider.vy = 0;
  }

  webTrail = [];
  dustParticles = [];
  phase = 'drawing';
}

function orderPoints(pts) {
  if (!pts.length) return [];
  const used = new Uint8Array(pts.length);
  const result = [];
  let cur = 0;
  used[cur] = 1;
  result.push(pts[cur]);

  // Build grid for fast lookup
  const cellSize = 20;
  const grid = new Map();
  pts.forEach((p, i) => {
    const key = `${Math.floor(p.x / cellSize)},${Math.floor(p.y / cellSize)}`;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(i);
  });

  function neighbors(idx, radius) {
    const p = pts[idx];
    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);
    const r = radius || 2;
    const candidates = [];
    for (let dx = -r; dx <= r; dx++) {
      for (let dy = -r; dy <= r; dy++) {
        const key = `${cx + dx},${cy + dy}`;
        if (grid.has(key)) candidates.push(...grid.get(key));
      }
    }
    return candidates;
  }

  // Average step distance — used to detect big jumps
  const avgStep = Math.max(4, Math.floor(Math.sqrt(W * H / pts.length) * 1.5));
  const jumpThreshold = avgStep * avgStep * 25; // বড় jump এর threshold

  for (let i = 1; i < pts.length; i++) {
    const near = neighbors(cur, 2);
    let bestDist = Infinity, bestIdx = -1;
    for (const j of near) {
      if (used[j]) continue;
      const dx = pts[j].x - pts[cur].x;
      const dy = pts[j].y - pts[cur].y;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; bestIdx = j; }
    }
    if (bestIdx === -1) {
      // fallback: scan wider radius first
      const wider = neighbors(cur, 5);
      for (const j of wider) {
        if (used[j]) continue;
        const dx = pts[j].x - pts[cur].x;
        const dy = pts[j].y - pts[cur].y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; bestIdx = j; }
      }
    }
    if (bestIdx === -1) {
      // last fallback: scan all
      for (let j = 0; j < pts.length; j++) {
        if (used[j]) continue;
        const dx = pts[j].x - pts[cur].x;
        const dy = pts[j].y - pts[cur].y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; bestIdx = j; }
      }
    }
    if (bestIdx === -1) break;

    // বড় jump হলে মাঝে intermediate (invisible bridge) points যোগ করি
    // এতে spider smooth ভাবে যাবে, backtrack দেখাবে না
    if (bestDist > jumpThreshold) {
      const steps = Math.min(8, Math.ceil(Math.sqrt(bestDist) / avgStep));
      const px = pts[cur].x, py = pts[cur].y;
      const qx = pts[bestIdx].x, qy = pts[bestIdx].y;
      for (let s = 1; s < steps; s++) {
        const t = s / steps;
        result.push({ x: px + (qx - px) * t, y: py + (qy - py) * t, bridge: true });
      }
    }

    used[bestIdx] = 1;
    result.push(pts[bestIdx]);
    cur = bestIdx;
  }
  return result;
}

// ── Spider Movement ────────────────────────────────
const SPIDER_SPEED = 4.5;
const INERTIA = 0.78;

function updateSpider() {
  if (pathPoints.length === 0) return;

  const target = pathPoints[pathIndex];
  const dx = target.x - spider.x;
  const dy = target.y - spider.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 6) {
    pathIndex++;
    if (pathIndex >= pathPoints.length) {
      // এক চক্র সম্পূর্ণ হয়েছে! এখন fading phase শুরু
      pathIndex = 0;
      phase = 'fading';
      waitTimer = 0;
    }
  }

  const force = Math.min(dist / 20, 1);
  const ax = (dx / (dist + 0.001)) * SPIDER_SPEED * force;
  const ay = (dy / (dist + 0.001)) * SPIDER_SPEED * force;

  spider.vx = spider.vx * INERTIA + ax * (1 - INERTIA) * 6;
  spider.vy = spider.vy * INERTIA + ay * (1 - INERTIA) * 6;

  spider.speed = Math.sqrt(spider.vx * spider.vx + spider.vy * spider.vy);

  if (spider.speed > 0.1) {
    spider.targetAngle = Math.atan2(spider.vy, spider.vx);
  }

  // Smooth angle
  let da = spider.targetAngle - spider.angle;
  while (da > Math.PI) da -= Math.PI * 2;
  while (da < -Math.PI) da += Math.PI * 2;
  spider.angle += da * 0.18;

  spider.x += spider.vx;
  spider.y += spider.vy;

  // Web trail — bridge points এ trail দেখাবে না
  const currentTarget = pathPoints[pathIndex];
  const isBridge = currentTarget && currentTarget.bridge;
  webTrail.push({ x: spider.x, y: spider.y, alpha: 0.7, break: isBridge });
  if (webTrail.length > 3000) webTrail.shift();

  // Dust particles
  if (spider.speed > 5 && Math.random() < 0.4) {
    dustParticles.push({
      x: spider.x + (Math.random() - 0.5) * 8,
      y: spider.y + (Math.random() - 0.5) * 8,
      vx: (Math.random() - 0.5) * 1.5,
      vy: (Math.random() - 0.5) * 1.5 - 0.5,
      life: 1,
      size: Math.random() * 2.5 + 0.5
    });
  }
}

// ── Draw Web Trail ─────────────────────────────────
function drawWebTrail() {
  if (webTrail.length < 2) return;

  // শুধু fading phase-এ fade করবে
  if (phase === 'fading') {
    for (let t of webTrail) t.alpha -= 0.006;
  }

  for (let i = 1; i < webTrail.length; i++) {
    const a = webTrail[i - 1];
    const b = webTrail[i];
    if (a.alpha <= 0 || b.alpha <= 0) continue;
    // bridge break হলে line টানবে না
    if (a.break || b.break) continue;
    const alpha = Math.min(a.alpha, b.alpha);

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(100, 150, 255, ${alpha * 0.6})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Remove expired
  webTrail = webTrail.filter(t => t.alpha > 0);

  // সব trail মিলিয়ে গেলে waiting শেষ করে আবার drawing শুরু
  if (phase === 'fading' && webTrail.length === 0) {
    phase = 'waiting';
    waitTimer = 0;
  }
}

// ── Draw Dust ──────────────────────────────────────
function drawDust() {
  for (const d of dustParticles) {
    d.x += d.vx;
    d.y += d.vy;
    d.life -= 0.025;
    const a = d.life;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150, 180, 255, ${a * 0.5})`;
    ctx.fill();
  }
  dustParticles = dustParticles.filter(d => d.life > 0);
}

// ── Draw Spider ────────────────────────────────────
function drawSpider(x, y, angle, speed) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.PI / 2);

  const s = 1 + speed * 0.04; // slight scale with speed
  ctx.scale(s, s);

  const t = Date.now() / 1000;

  // Glow shadow
  ctx.shadowColor = 'rgba(100, 150, 255, 0.9)';
  ctx.shadowBlur = 18;

  // ── 8 Legs ──────────────────────────────────────
  const legDefs = [
    // [mountX, mountY, ctrl1X, ctrl1Y, ctrl2X, ctrl2Y, tipX, tipY, side]
    // Front legs
    [-4, -6,  -16, -18,  -28, -10,  -32,  4,  1],
    [ 4, -6,   16, -18,   28, -10,   32,  4,  1],
    [-5, -2,  -20, -14,  -34,  -2,  -36, 12,  1],
    [ 5, -2,   20, -14,   34,  -2,   36, 12,  1],
    // Rear legs
    [-5,  4,  -18,  14,  -30,  22,  -28, 34,  1],
    [ 5,  4,   18,  14,   30,  22,   28, 34,  1],
    [-4,  8,  -12,  22,  -18,  36,  -14, 46,  1],
    [ 4,  8,   12,  22,   18,  36,   14, 46,  1],
  ];

  // Animate leg tip by walking cycle
  const walkCycle = Math.sin(t * 12) * 3;

  legDefs.forEach((leg, i) => {
    const [mx, my, c1x, c1y, c2x, c2y, tx, ty] = leg;
    const phase = (i % 2 === 0) ? walkCycle : -walkCycle;

    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.bezierCurveTo(c1x, c1y, c2x + phase, c2y + phase * 0.5, tx + phase, ty + phase * 0.3);
    ctx.strokeStyle = 'rgba(130, 170, 255, 0.9)';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(100, 150, 255, 0.8)';
    ctx.stroke();

    // Leg hair spikes
    for (let h = 0.3; h <= 0.8; h += 0.25) {
      const hx = mx + (tx - mx) * h;
      const hy = my + (ty - my) * h;
      const perpX = -(ty - my) * 0.08;
      const perpY = (tx - mx) * 0.08;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      ctx.lineTo(hx + perpX, hy + perpY);
      ctx.strokeStyle = 'rgba(100, 140, 255, 0.5)';
      ctx.lineWidth = 0.8;
      ctx.shadowBlur = 4;
      ctx.stroke();
    }

    // Claw tips
    ctx.beginPath();
    ctx.arc(tx + phase, ty + phase * 0.3, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 220, 255, 0.9)';
    ctx.shadowBlur = 8;
    ctx.fill();
  });

  // ── Abdomen ──────────────────────────────────────
  ctx.shadowBlur = 22;
  ctx.shadowColor = 'rgba(100, 150, 255, 1)';

  const abdGrad = ctx.createRadialGradient(-3, 14, 2, 0, 18, 14);
  abdGrad.addColorStop(0, 'rgba(180, 210, 255, 0.95)');
  abdGrad.addColorStop(0.4, 'rgba(80, 120, 220, 0.9)');
  abdGrad.addColorStop(1, 'rgba(20, 30, 80, 0.95)');

  ctx.beginPath();
  ctx.ellipse(0, 22, 11, 16, 0, 0, Math.PI * 2);
  ctx.fillStyle = abdGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(150, 190, 255, 0.6)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Abdomen pattern stripes
  for (let row = 0; row < 3; row++) {
    ctx.beginPath();
    ctx.ellipse(0, 16 + row * 5, 8 - row * 1.5, 1.2, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(180, 210, 255, ${0.15 - row * 0.03})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // Spinneret
  ctx.beginPath();
  ctx.ellipse(0, 36, 3, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(60, 90, 200, 0.85)';
  ctx.shadowBlur = 8;
  ctx.fill();

  // ── Cephalothorax ────────────────────────────────
  const headGrad = ctx.createRadialGradient(-2, -4, 1, 0, 0, 10);
  headGrad.addColorStop(0, 'rgba(200, 225, 255, 0.98)');
  headGrad.addColorStop(0.5, 'rgba(100, 150, 255, 0.9)');
  headGrad.addColorStop(1, 'rgba(30, 50, 140, 0.95)');

  ctx.beginPath();
  ctx.ellipse(0, 0, 9, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = headGrad;
  ctx.shadowBlur = 18;
  ctx.shadowColor = 'rgba(130, 170, 255, 1)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(180, 210, 255, 0.7)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // Pedicel (neck)
  ctx.beginPath();
  ctx.ellipse(0, 9, 3.5, 3.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(60, 100, 200, 0.9)';
  ctx.shadowBlur = 6;
  ctx.fill();

  // ── Eyes ─────────────────────────────────────────
  const eyePositions = [
    [-4, -10], [4, -10],   // main 2
    [-6, -7],  [6, -7],    // side pair
    [-3, -7],  [3, -7],    // inner pair
    [-5, -4],  [5, -4],    // lower side
  ];
  const eyeSizes = [2.2, 2.2, 1.4, 1.4, 1.2, 1.2, 1.0, 1.0];
  const eyePulse = 0.7 + Math.sin(t * 3) * 0.3;

  eyePositions.forEach(([ex, ey], i) => {
    const r = eyeSizes[i];
    // Glow ring
    ctx.beginPath();
    ctx.arc(ex, ey, r + 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 220, 255, ${0.15 * eyePulse})`;
    ctx.shadowBlur = 14;
    ctx.shadowColor = 'rgba(150, 200, 255, 1)';
    ctx.fill();
    // Eye
    ctx.beginPath();
    ctx.arc(ex, ey, r, 0, Math.PI * 2);
    const eyeGrad = ctx.createRadialGradient(ex - r * 0.3, ey - r * 0.3, 0, ex, ey, r);
    eyeGrad.addColorStop(0, `rgba(230, 245, 255, ${eyePulse})`);
    eyeGrad.addColorStop(0.5, `rgba(150, 200, 255, ${eyePulse * 0.9})`);
    eyeGrad.addColorStop(1, `rgba(50, 80, 200, ${eyePulse * 0.8})`);
    ctx.fillStyle = eyeGrad;
    ctx.shadowBlur = 10;
    ctx.fill();
    // Reflection
    ctx.beginPath();
    ctx.arc(ex - r * 0.3, ey - r * 0.35, r * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${0.8 * eyePulse})`;
    ctx.shadowBlur = 3;
    ctx.fill();
  });

  // Chelicerae (fangs)
  ctx.shadowBlur = 10;
  ctx.shadowColor = 'rgba(100, 150, 255, 0.8)';
  [[-3, -14], [3, -14]].forEach(([fx, fy]) => {
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.quadraticCurveTo(fx * 1.5, fy - 4, fx * 0.8, fy - 8);
    ctx.strokeStyle = 'rgba(180, 210, 255, 0.85)';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Venom drop
    ctx.beginPath();
    ctx.arc(fx * 0.8, fy - 8.5, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100, 200, 255, 0.9)';
    ctx.fill();
  });

  // Pedipalps
  [[-8, -8], [8, -8]].forEach(([px, py]) => {
    ctx.beginPath();
    ctx.moveTo(px * 0.6, py);
    ctx.quadraticCurveTo(px, py - 4, px * 1.1, py - 6);
    ctx.strokeStyle = 'rgba(130, 170, 255, 0.7)';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px * 1.1, py - 6.5, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100, 150, 255, 0.8)';
    ctx.shadowBlur = 8;
    ctx.fill();
  });

  ctx.restore();
}

// ── Background ambient ─────────────────────────────
function drawBackground() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.25)';
  ctx.fillRect(0, 0, W, H);
}

// ── Main loop ──────────────────────────────────────
function loop() {
  animId = requestAnimationFrame(loop);

  drawBackground();
  drawWebTrail();
  drawDust();

  if (phase === 'drawing') {
    if (!paused && pathPoints.length > 0) {
      updateSpider();
      drawSpider(spider.x, spider.y, spider.angle, spider.speed);
    }
  } else if (phase === 'fading') {
    // Spider লুকিয়ে যাবে, trail fade হবে
    // drawWebTrail()-এ handle হচ্ছে
  } else if (phase === 'waiting') {
    waitTimer++;
    if (waitTimer >= WAIT_FRAMES) {
      // নতুন করে শুরু!
      generatePath();
      phase = 'drawing';
    }
  }
}

// ── Init ───────────────────────────────────────────
generatePath();
loop();
</script>
</body>
</html>
